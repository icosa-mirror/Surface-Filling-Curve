name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: macos
            os: macos-latest
            cmake_extra: ""
            lib_src: build_plugin/libsurface_filling_curve.dylib
            lib_dst: unity/com.iota97.surface-filling-curve/Plugins/macOS/libsurface_filling_curve.dylib

          - name: linux
            os: ubuntu-latest
            cmake_extra: ""
            lib_src: build_plugin/libsurface_filling_curve.so
            lib_dst: unity/com.iota97.surface-filling-curve/Plugins/Linux/x86_64/libsurface_filling_curve.so

          - name: windows
            os: windows-latest
            cmake_extra: ""
            lib_src: build_plugin/Release/surface_filling_curve.dll
            lib_dst: unity/com.iota97.surface-filling-curve/Plugins/Windows/x86_64/surface_filling_curve.dll

          - name: ios
            os: macos-latest
            cmake_extra: >-
              -DCMAKE_SYSTEM_NAME=iOS
              -DCMAKE_OSX_ARCHITECTURES=arm64
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
            lib_src: build_plugin/libsurface_filling_curve.a
            lib_dst: unity/com.iota97.surface-filling-curve/Plugins/iOS/libsurface_filling_curve.a

          - name: android
            os: ubuntu-latest
            cmake_extra: >-
              -DCMAKE_SYSTEM_NAME=Android
              -DCMAKE_ANDROID_NDK=$ANDROID_NDK_ROOT
              -DCMAKE_ANDROID_ARCH_ABI=arm64-v8a
              -DCMAKE_ANDROID_STL_TYPE=c++_static
              -DANDROID_PLATFORM=android-24
            lib_src: build_plugin/libsurface_filling_curve.so
            lib_dst: unity/com.iota97.surface-filling-curve/Plugins/Android/libsurface_filling_curve.so

    runs-on: ${{ matrix.os }}
    name: build-${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build_plugin -S . -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build_plugin --target surface_filling_curve --config Release

      - name: Install plugin
        shell: bash
        run: |
          mkdir -p "$(dirname "${{ matrix.lib_dst }}")"
          cp "${{ matrix.lib_src }}" "${{ matrix.lib_dst }}"

      - name: Sign (macOS desktop only)
        if: matrix.name == 'macos'
        run: codesign --force --sign - "${{ matrix.lib_dst }}"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.name }}
          path: ${{ matrix.lib_dst }}

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download macOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-macos
          path: unity/com.iota97.surface-filling-curve/Plugins/macOS/

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux
          path: unity/com.iota97.surface-filling-curve/Plugins/Linux/x86_64/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: binary-windows
          path: unity/com.iota97.surface-filling-curve/Plugins/Windows/x86_64/

      - name: Download iOS binary
        uses: actions/download-artifact@v4
        with:
          name: binary-ios
          path: unity/com.iota97.surface-filling-curve/Plugins/iOS/

      - name: Download Android binary
        uses: actions/download-artifact@v4
        with:
          name: binary-android
          path: unity/com.iota97.surface-filling-curve/Plugins/Android/

      - name: Publish to upm branch
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp -r unity/com.iota97.surface-filling-curve/. /tmp/upm-package
          git switch --orphan upm-tmp
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r /tmp/upm-package/. .
          git add -A
          find Plugins -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.dll" -o -name "*.a" \) -exec git add -f {} +
          git diff --cached --quiet && exit 0
          git commit -m "chore: publish upm package [skip ci]"
          git push origin HEAD:upm --force
